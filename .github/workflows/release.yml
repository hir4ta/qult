name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: alfred-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: alfred-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: alfred-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: alfred-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Build JS bundle
        run: bun run build

      - name: Compile binary
        run: |
          bun build dist/cli.mjs \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Install web dependencies
        run: cd web && npm install --legacy-peer-deps

      - name: Build
        run: bun run build

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/alfred-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/alfred-darwin-arm64
            binaries/alfred-darwin-x64
            binaries/alfred-linux-arm64
            binaries/alfred-linux-x64
