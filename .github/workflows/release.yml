name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: qult-linux-x64
            install_os: linux
            install_cpu: x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: qult-linux-arm64
            install_os: linux
            install_cpu: arm64
          - os: ubuntu-latest
            target: bun-linux-x64-musl
            artifact: qult-linux-x64-musl
            install_os: linux
            install_cpu: x64
          - os: ubuntu-latest
            target: bun-linux-arm64-musl
            artifact: qult-linux-arm64-musl
            install_os: linux
            install_cpu: arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: qult-darwin-arm64
            install_os: darwin
            install_cpu: arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            artifact: qult-darwin-x64
            install_os: darwin
            install_cpu: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies (with target platform native packages)
        run: bun install --os ${{ matrix.install_os }} --cpu ${{ matrix.install_cpu }}

      - name: Compile binary
        run: |
          bun build.ts --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }}

      - name: Package as tar.gz + SHA256
        run: |
          # Rename binary to plain 'qult' inside archive
          mv ${{ matrix.artifact }} qult
          tar czf ${{ matrix.artifact }}.tar.gz qult
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          # Restore name for artifact upload
          mv qult ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: binaries/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/*.tar.gz
            binaries/*.sha256
