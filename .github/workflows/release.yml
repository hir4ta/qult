name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Verify plugin bundle is up to date
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go run -ldflags "-X main.version=$VERSION" . plugin-bundle ./plugin
          git diff --exit-code ./plugin || (echo "plugin/ is out of date — run 'go run . plugin-bundle ./plugin' and commit" && exit 1)

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
