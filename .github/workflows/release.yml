name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: alfred-linux-x64
            opentui_platform: "@opentui/core-linux-x64@0.1.90"
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: alfred-linux-arm64
            opentui_platform: "@opentui/core-linux-arm64@0.1.90"
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: alfred-darwin-arm64
            opentui_platform: "@opentui/core-darwin-arm64@0.1.90"
          - os: macos-15-intel
            target: bun-darwin-x64
            artifact: alfred-darwin-x64
            opentui_platform: "@opentui/core-darwin-x64@0.1.90"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Install target platform native package
        run: bun add --no-save ${{ matrix.opentui_platform }}

      - name: Patch @opentui/core for static platform import
        run: |
          PLATFORM="${{ matrix.target }}"
          PLATFORM="${PLATFORM#bun-}"
          OS="${PLATFORM%-*}"
          ARCH="${PLATFORM##*-}"
          bash scripts/patch-opentui.sh "$OS" "$ARCH"

      - name: Compile binary
        run: |
          bun build.ts --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  package-web-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: bun run build:web

      - name: Create web assets archive
        run: tar -czf alfred-web-assets.tar.gz -C web/dist .

      - name: Upload web assets
        uses: actions/upload-artifact@v6
        with:
          name: alfred-web-assets
          path: alfred-web-assets.tar.gz

  release:
    needs: [build-binaries, package-web-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: binaries/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/alfred-darwin-* binaries/alfred-linux-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/alfred-darwin-arm64
            binaries/alfred-darwin-x64
            binaries/alfred-linux-arm64
            binaries/alfred-linux-x64
            binaries/alfred-web-assets.tar.gz
