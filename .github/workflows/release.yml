name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: alfred-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: alfred-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: alfred-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            artifact: alfred-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Build JS bundle
        run: bun run build

      - name: Compile binary
        run: |
          bun build dist/cli.mjs \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --external @opentui/core \
            --external @opentui/react \
            --external react \
            --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  package-web-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: bun run build:web

      - name: Create web assets archive
        run: tar -czf alfred-web-assets.tar.gz -C web/dist .

      - name: Upload web assets
        uses: actions/upload-artifact@v6
        with:
          name: alfred-web-assets
          path: alfred-web-assets.tar.gz

  release:
    needs: [build-binaries, package-web-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: binaries/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/alfred-darwin-* binaries/alfred-linux-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/alfred-darwin-arm64
            binaries/alfred-darwin-x64
            binaries/alfred-linux-arm64
            binaries/alfred-linux-x64
            binaries/alfred-web-assets.tar.gz
