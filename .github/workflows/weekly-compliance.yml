name: Weekly Plugin Compliance Check

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday 00:00 UTC (09:00 JST)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  # Phase 1: CC バージョンチェック（LLM コスト $0）
  version-check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      current: ${{ steps.check.outputs.current }}
      last: ${{ steps.check.outputs.last }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Claude Code version
        id: check
        run: |
          CURRENT=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
          LAST="none"
          if [ -f .github/compliance-state.json ]; then
            LAST=$(jq -r '.cc_version // "none"' .github/compliance-state.json)
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "last=$LAST" >> "$GITHUB_OUTPUT"
          CHANGED=$([ "$CURRENT" != "$LAST" ] && echo true || echo false)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "CC version: $LAST → $CURRENT (changed=$CHANGED)"

  # Phase 2: changelog diff → 影響分析 → 深掘り（バージョン変更時のみ）
  compliance-check:
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze changelog and check compliance
        id: check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a Claude Code plugin compliance auditor for the claude-alfred plugin.
            CC version updated: ${{ needs.version-check.outputs.last }} → ${{ needs.version-check.outputs.current }}

            ## Phase 1: Changelog diff analysis

            1. WebFetch https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md
               - Extract ONLY entries between version ${{ needs.version-check.outputs.last }} and ${{ needs.version-check.outputs.current }}
            2. From the diff, identify changes that affect ANY of: hooks, skills, plugins, MCP, agents, rules
               - New/changed fields, deprecated patterns, new event types, schema changes
            3. If NO plugin-relevant changes found, output ONLY:
               ```json
               {"action_needed": false, "reason": "No plugin-relevant changes in changelog"}
               ```
               and STOP here.

            ## Phase 2: Targeted compliance check (only if plugin-relevant changes found)

            1. Read the current plugin files:
               - plugin/hooks/hooks.json
               - plugin/.claude-plugin/plugin.json
               - plugin/.mcp.json
               - plugin/agents/alfred.md
               - Glob for plugin/skills/*/SKILL.md and read each
            2. For EACH changelog change identified in Phase 1:
               - Fetch ONLY the specific doc page that covers this change (e.g. hooks page for hook changes)
               - Cross-reference against the relevant plugin file
            3. Output a JSON object with ONLY HIGH and MEDIUM findings (skip LOW and PASS):
               ```json
               {
                 "action_needed": true,
                 "cc_version": "${{ needs.version-check.outputs.current }}",
                 "findings": [
                   {
                     "severity": "HIGH|MEDIUM",
                     "category": "hooks|skills|mcp|manifest|agent",
                     "item": "specific item name",
                     "message": "what's wrong",
                     "recommendation": "how to fix",
                     "doc_reference": "which doc section"
                   }
                 ]
               }
               ```
               If no HIGH/MEDIUM findings, output: {"action_needed": false, "reason": "All changes reviewed, no issues found"}

            IMPORTANT: Do NOT fetch docs that are unrelated to the changelog changes. Do NOT report LOW severity or PASS items.
          claude_args: "--max-turns 5"

      - name: Parse result
        id: parse
        env:
          RESULT: ${{ steps.check.outputs.result }}
        run: |
          if [ -z "$RESULT" ]; then
            echo "::warning::claude-code-action returned empty result"
            echo "action_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract JSON (handles both bare JSON and markdown-wrapped)
          JSON=$(echo "$RESULT" | jq -r '.' 2>/dev/null || echo "")
          if [ -z "$JSON" ]; then
            # Try extracting from markdown code block
            JSON=$(echo "$RESULT" | sed -n '/^```/,/^```/p' | sed '1d;$d' | jq -r '.' 2>/dev/null || echo "")
          fi
          if [ -z "$JSON" ]; then
            echo "::warning::Could not parse JSON from result"
            echo "action_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ACTION=$(echo "$JSON" | jq -r '.action_needed // false')
          echo "action_needed=$ACTION" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "true" ]; then
            HIGH_COUNT=$(echo "$JSON" | jq '[.findings[]? | select(.severity == "HIGH")] | length')
            echo "high_count=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
            echo "$JSON" > /tmp/findings.json
          fi

      - name: Create issue if HIGH findings
        if: steps.parse.outputs.action_needed == 'true' && steps.parse.outputs.high_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          HIGH_COUNT=${{ steps.parse.outputs.high_count }}
          CC_VERSION=${{ needs.version-check.outputs.current }}

          FINDINGS=$(jq -r '.findings[] | select(.severity == "HIGH") | "#### [\(.severity)] \(.category): \(.item)\n\(.message)\n\n**Recommendation**: \(.recommendation)\n\n**Doc reference**: \(.doc_reference)\n"' /tmp/findings.json)
          MEDIUM=$(jq -r '.findings[] | select(.severity == "MEDIUM") | "- **\(.category)/\(.item)**: \(.message) → \(.recommendation)"' /tmp/findings.json)

          gh issue create \
            --title "Plugin Compliance: ${HIGH_COUNT} HIGH issues (CC v${CC_VERSION})" \
            --label "compliance" \
            --body "$(cat <<EOF
## Weekly Plugin Compliance Check

**Date**: ${DATE}
**Claude Code version**: ${CC_VERSION}
**HIGH severity issues**: ${HIGH_COUNT}

### HIGH (action required)

${FINDINGS}

<details><summary>MEDIUM findings</summary>

${MEDIUM}

</details>

---
*Auto-generated by [weekly-compliance workflow](https://github.com/${{ github.repository }}/actions/workflows/weekly-compliance.yml)*
EOF
)"

  # 状態ファイル更新（バージョン変更時のみ）
  update-state:
    needs: [version-check, compliance-check]
    if: always() && needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update compliance state
        env:
          CC_VERSION: ${{ needs.version-check.outputs.current }}
        run: |
          mkdir -p .github
          printf '{\n  "cc_version": "%s",\n  "checked_at": "%s"\n}\n' \
            "$CC_VERSION" "$(date -u +%Y-%m-%d)" > .github/compliance-state.json

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/compliance-state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update compliance state (CC v${{ needs.version-check.outputs.current }})"
          git push
