version: "3"

vars:
  WEB_DIR: web

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  build:
    desc: Build React SPA and TypeScript CLI
    deps: [web:build]
    cmds:
      - bun run build

  dev:
    desc: Start Vite dev server (use with ALFRED_DEV=1 alfred dashboard)
    dir: "{{.WEB_DIR}}"
    cmds:
      - bun run dev

  dashboard:
    desc: Open web dashboard (localhost:7575)
    cmds:
      - bun dist/cli.mjs dashboard

  active:
    desc: Show active specs in TUI
    cmds:
      - bun src/tui/main.tsx

  specs:
    desc: Show all specs in TUI (including completed)
    cmds:
      - bun src/tui/main.tsx --all

  check:
    desc: Run all checks (tsc + Biome lint)
    cmds:
      - bun run typecheck
      - bun run lint

  fix:
    desc: Auto-fix Biome lint/format issues (safe)
    cmds:
      - bun run lint:fix

  fix:unsafe:
    desc: Auto-fix all Biome issues including unsafe fixes
    cmds:
      - bunx biome check --write --unsafe src/ web/src/

  test:
    desc: Run vitest
    cmds:
      - bun run test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist {{.WEB_DIR}}/dist

  # Internal tasks
  web:build:
    desc: Build React SPA
    dir: "{{.WEB_DIR}}"
    cmds:
      - bun run build
    sources:
      - src/**/*
      - index.html
      - vite.config.ts
      - tsconfig.json
      - package.json
    generates:
      - dist/**/*
