version: "3"

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  build:
    desc: Build CLI bundle (bun build)
    cmds:
      - bun build.ts

  tui:
    desc: Show quality dashboard in terminal
    cmds:
      - bun src/tui/main.tsx

  check:
    desc: Run all checks (tsc + Biome lint)
    cmds:
      - bun run typecheck
      - bun run lint

  fix:
    desc: Auto-fix Biome lint/format issues (safe)
    cmds:
      - bun run lint:fix

  test:
    desc: Run vitest
    cmds:
      - bun run test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
