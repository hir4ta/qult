version: 2

builds:
  - main: ./cmd/alfred
    binary: alfred
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "alfred_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: hir4ta
      name: homebrew-alfred
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: alfred
    homepage: https://github.com/hir4ta/claude-alfred
    description: "Your silent butler for Claude Code"
    license: MIT
    skip_upload: auto
    install: |
      bin.install "alfred"

changelog:
  sort: asc
